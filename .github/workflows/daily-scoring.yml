name: Daily Scoring Pipeline

on:
  schedule:
    # Run at 22:00 UTC (after US market close) Mon-Fri
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      horizon:
        description: 'Time horizon in months (3, 6, 12, or "all")'
        required: false
        default: 'all'

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run scoring pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          HORIZON="${{ github.event.inputs.horizon || 'all' }}"
          if [ "$HORIZON" = "all" ]; then
            npm run score
          else
            npx tsx src/cron/daily-scoring.ts --horizon=$HORIZON
          fi

      - name: Verify runs landed in Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          HORIZON="${{ github.event.inputs.horizon || 'all' }}"
          npx tsx scripts/verify-runs.ts --horizon=$HORIZON
